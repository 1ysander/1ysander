<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b2838;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- DNA helix gradient -->
    <linearGradient id="dna-strand1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="dna-strand2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.5"/>
    </linearGradient>

    <!-- Neural network gradient -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0"/>
    </radialGradient>

    <!-- Molecular bond gradient -->
    <linearGradient id="bond-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#475569;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- ====== LEFT SIDE: DNA Double Helix ====== -->
  <g transform="translate(60, 20)" filter="url(#glow-cyan)">
    <!-- Strand 1 (front sine wave) -->
    <path d="M 0,0 C 15,20 35,30 25,60 C 15,90 35,100 25,130 C 15,160 35,170 25,200 C 15,230 35,240 25,270"
          fill="none" stroke="url(#dna-strand1)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Strand 2 (back sine wave, phase shifted) -->
    <path d="M 50,0 C 35,20 15,30 25,60 C 35,90 15,100 25,130 C 35,160 15,170 25,200 C 35,230 15,240 25,270"
          fill="none" stroke="url(#dna-strand2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base pairs (rungs) -->
    <g stroke-width="1.2" opacity="0.6">
      <line x1="8" y1="15" x2="42" y2="15" stroke="#00d4aa"/>
      <line x1="18" y1="45" x2="32" y2="45" stroke="#6366f1"/>
      <line x1="22" y1="75" x2="28" y2="75" stroke="#a855f7"/>
      <line x1="18" y1="105" x2="32" y2="105" stroke="#00d4aa"/>
      <line x1="8" y1="135" x2="42" y2="135" stroke="#6366f1"/>
      <line x1="18" y1="165" x2="32" y2="165" stroke="#a855f7"/>
      <line x1="22" y1="195" x2="28" y2="195" stroke="#00d4aa"/>
      <line x1="18" y1="225" x2="32" y2="225" stroke="#6366f1"/>
      <line x1="8" y1="255" x2="42" y2="255" stroke="#a855f7"/>
    </g>
    <!-- Nucleotide labels -->
    <g font-family="monospace" font-size="7" fill="#00d4aa" opacity="0.4">
      <text x="-5" y="18">A</text>
      <text x="47" y="18">T</text>
      <text x="-5" y="108">G</text>
      <text x="47" y="108">C</text>
      <text x="-5" y="198">C</text>
      <text x="47" y="198">G</text>
    </g>
  </g>

  <!-- ====== RIGHT SIDE: Molecular Structure (benzene + branches) ====== -->
  <g transform="translate(730, 40)" opacity="0.35" filter="url(#glow-soft)">
    <!-- Benzene ring -->
    <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="none" stroke="#00d4aa" stroke-width="1.5"/>
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="#00d4aa" stroke-width="0.8" opacity="0.5"/>
    <!-- Carbon atoms at vertices -->
    <circle cx="0" cy="-35" r="3" fill="#0d1b2a" stroke="#00d4aa" stroke-width="1"/>
    <circle cx="30" cy="-17" r="3" fill="#0d1b2a" stroke="#00d4aa" stroke-width="1"/>
    <circle cx="30" cy="17" r="3" fill="#0d1b2a" stroke="#00d4aa" stroke-width="1"/>
    <circle cx="0" cy="35" r="3" fill="#0d1b2a" stroke="#00d4aa" stroke-width="1"/>
    <circle cx="-30" cy="17" r="3" fill="#0d1b2a" stroke="#00d4aa" stroke-width="1"/>
    <circle cx="-30" cy="-17" r="3" fill="#0d1b2a" stroke="#00d4aa" stroke-width="1"/>
    <!-- Branches -->
    <line x1="0" y1="-35" x2="0" y2="-60" stroke="#6366f1" stroke-width="1"/>
    <circle cx="0" cy="-63" r="2.5" fill="#6366f1" opacity="0.7"/>
    <line x1="30" y1="-17" x2="55" y2="-30" stroke="#6366f1" stroke-width="1"/>
    <circle cx="58" cy="-32" r="2.5" fill="#a855f7" opacity="0.7"/>
    <line x1="30" y1="17" x2="55" y2="30" stroke="#6366f1" stroke-width="1"/>
    <line x1="55" y1="30" x2="75" y2="20" stroke="#6366f1" stroke-width="0.8"/>
    <line x1="55" y1="30" x2="65" y2="50" stroke="#6366f1" stroke-width="0.8"/>
    <circle cx="55" cy="30" r="2.5" fill="#00d4aa" opacity="0.7"/>
    <line x1="-30" y1="-17" x2="-55" y2="-30" stroke="#6366f1" stroke-width="1"/>
    <circle cx="-58" cy="-32" r="2.5" fill="#00d4aa" opacity="0.7"/>
    <!-- OH group label -->
    <text x="60" y="55" font-family="monospace" font-size="8" fill="#a855f7" opacity="0.5">OH</text>
    <text x="-72" y="-28" font-family="monospace" font-size="8" fill="#00d4aa" opacity="0.5">NH2</text>
  </g>

  <!-- ====== Second molecule cluster (top right) ====== -->
  <g transform="translate(810, 180)" opacity="0.2">
    <!-- Smaller ring structure -->
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="none" stroke="#a855f7" stroke-width="1"/>
    <line x1="0" y1="-20" x2="0" y2="-35" stroke="#a855f7" stroke-width="0.8"/>
    <line x1="17" y1="10" x2="30" y2="18" stroke="#a855f7" stroke-width="0.8"/>
    <line x1="-17" y1="10" x2="-30" y2="18" stroke="#a855f7" stroke-width="0.8"/>
    <circle cx="0" cy="-20" r="2" fill="#a855f7" opacity="0.5"/>
    <circle cx="17" cy="10" r="2" fill="#a855f7" opacity="0.5"/>
    <circle cx="-17" cy="10" r="2" fill="#a855f7" opacity="0.5"/>
  </g>

  <!-- ====== BOTTOM: Neural Network Layer ====== -->
  <g transform="translate(0, 0)" opacity="0.15">
    <!-- Connections (drawn first, behind nodes) -->
    <g stroke="#00d4aa" stroke-width="0.5">
      <!-- Input to hidden -->
      <line x1="160" y1="260" x2="280" y2="240"/>
      <line x1="160" y1="260" x2="280" y2="280"/>
      <line x1="160" y1="290" x2="280" y2="240"/>
      <line x1="160" y1="290" x2="280" y2="280"/>
      <line x1="160" y1="290" x2="280" y2="310"/>
      <!-- Hidden to output -->
      <line x1="280" y1="240" x2="400" y2="260"/>
      <line x1="280" y1="280" x2="400" y2="260"/>
      <line x1="280" y1="310" x2="400" y2="290"/>
      <line x1="280" y1="280" x2="400" y2="290"/>
    </g>
    <!-- Nodes -->
    <circle cx="160" cy="260" r="4" fill="#00d4aa"/>
    <circle cx="160" cy="290" r="4" fill="#00d4aa"/>
    <circle cx="280" cy="240" r="4" fill="#6366f1"/>
    <circle cx="280" cy="280" r="4" fill="#6366f1"/>
    <circle cx="280" cy="310" r="4" fill="#6366f1"/>
    <circle cx="400" cy="260" r="4" fill="#a855f7"/>
    <circle cx="400" cy="290" r="4" fill="#a855f7"/>
  </g>

  <!-- ====== Floating particles (scattered data points) ====== -->
  <g opacity="0.3">
    <circle cx="150" cy="50" r="1.5" fill="#00d4aa">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="80" r="1" fill="#6366f1">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="290" r="1.5" fill="#a855f7">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="45" r="1" fill="#00d4aa">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="200" r="1.2" fill="#6366f1">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="55" r="1" fill="#a855f7">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ====== CENTER: Main Text ====== -->
  <g transform="translate(450, 120)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="1">
      Lysander Elgar
    </text>
    <text x="0" y="38" text-anchor="middle" font-family="monospace" font-size="14" fill="#00d4aa" opacity="0.9" letter-spacing="2">
      COMPUTATIONAL BIOLOGY  /  MACHINE LEARNING
    </text>

    <!-- Thin separator -->
    <line x1="-120" y1="58" x2="120" y2="58" stroke="#334155" stroke-width="0.8"/>

    <!-- Subtitle -->
    <text x="0" y="82" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="1">
      Genomics  |  GWAS  |  Neural Networks  |  Epigenomics
    </text>

    <!-- Sequence motif decoration -->
    <text x="0" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155" opacity="0.6" letter-spacing="3">
      ATCGATCGNNNATCGATCG
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="316" width="900" height="4" fill="url(#dna-strand1)" opacity="0.6"/>
</svg>
